name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests-and-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run Bandit (SAST)
        run: bandit -r . -ll || true

  dast-zap:
    runs-on: ubuntu-latest
    needs: tests-and-sast
    steps:
      - uses: actions/checkout@v4
      - name: Start app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          nohup python app.py &
          sleep 3
      - name: Run OWASP ZAP baseline scan (placeholder)
        run: |
          echo "Running a baseline ZAP scan against http://127.0.0.1:5000"
          # For a full DAST run, configure OWASP ZAP Docker image and run a baseline scan here.
