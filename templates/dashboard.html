{% extends 'layout.html' %}
{% block content %}
  <h2 class="fade-in">Dashboard</h2>
  <p class="fade-in">Welcome, {{ session.username }}!</p>
  <h4 class="mt-3">Documents</h4>
  <ul class="list-unstyled search-results">
    {% for d in docs %}
      <li class="card p-2 mb-2 fade-in"><strong>{{ d.title }}</strong>: {{ d.content }}</li>
    {% endfor %}
  </ul>
  <p><a href="/search" class="btn btn-outline-secondary">Search Documents</a></p>
{% endblock %}
